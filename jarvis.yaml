substitutions:
  name: "jarvis-box"
  friendly_name: "Jarvis S3"

packages:
  # This targets the official Box-3 config inside the repo you just cloned locally
  box_base: !include esp32-s3-box-3/esp32-s3-box-3.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

api:
  encryption:
    # Use your actual base64 API key here
    key: !secret api_key


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


i2c:
  - id: bus_dock
    sda: GPIO41
    scl: GPIO40
    scan: true
    
sensor:
  # The Temp & Humidity Sensor on the Dock
  - platform: aht10
    variant: AHT20
    i2c_id: bus_dock  # Forces the sensor to use the dock pins!
    temperature:
      name: "${friendly_name} Temperature"
    humidity:
      name: "${friendly_name} Humidity"
    update_interval: 60s

binary_sensor:
  # The 5.8 GHz Radar Presence Sensor on the Dock
  - platform: gpio
    pin: GPIO21
    name: "${friendly_name} Radar Presence"
    device_class: motion

animation:
  - file: "jarvis_logo.gif"
    id: jarvis_anim
    type: RGB565  # Forces 16-bit color to save crucial Flash memory

# 2. Tell the screen exactly where and how to draw it
display:
  - platform: ili9xxx
    id: !extend my_display  # Extends the existing screen from the base package
    lambda: |-
      # Draw the image in the center of the screen (adjust X: 100, Y: 60 to center it based on your GIF size)
      it.image(100, 60, id(jarvis_anim));
      
      # Tell the animation to move to the next frame every time the screen refreshes
      id(jarvis_anim).next_frame();
