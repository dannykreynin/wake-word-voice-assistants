substitutions:
  name: "jarvis-box"
  friendly_name: "Jarvis S3"

packages:
  # This targets the official Box-3 config inside the repo you just cloned locally
  box_base: !include esp32-s3-box-3/esp32-s3-box-3.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false

api:
  encryption:
    # Use your actual base64 API key here
    key: !secret api_key


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


i2c:
  - id: bus_dock
    sda: GPIO41
    scl: GPIO40
    scan: true
    
sensor:
  # The Temp & Humidity Sensor on the Dock
  - platform: aht10
    variant: AHT20
    i2c_id: bus_dock  # Forces the sensor to use the dock pins!
    temperature:
      name: "${friendly_name} Temperature"
    humidity:
      name: "${friendly_name} Humidity"
    update_interval: 60s
    
animation:
  - file: "jarvis_logo.gif"
    id: jarvis_anim
    type: RGB565
    
# --- ANIMATION MOTOR ---
interval:
  - interval: 100ms
    then:
      - if:
          condition:
            # VERIFIED: The official way to check a global boolean
            - lambda: 'return id(show_jarvis_gif);'
          then:
            # VERIFIED: The native action to advance a GIF frame
            - animation.next_frame: jarvis_anim
            # VERIFIED: The native action to force a display to redraw
            - component.update: s3_box_lcd
          
binary_sensor:
  # The 5.8 GHz Radar Presence Sensor on the Dock
  - platform: gpio
    pin: GPIO21
    name: "${friendly_name} Radar Presence"
    device_class: motion

# --- THE SWITCH ---
globals:
  # This creates a boolean (true/false) switch starting in the OFF state
  - id: show_jarvis_gif
    type: bool
    initial_value: 'false'
